<div class="news-turnstile news-turnstile-{{ turnstile_size|default:'flexible' }} rounded-lg bg-white/70 px-0 py-3 dark:bg-black/20">
    <p class="mb-2 px-3 text-xs font-bold uppercase tracking-wide text-slate-500 dark:text-slate-400"
        x-text="t('Verificação anti-bot', 'Anti-bot verification')">
        Verificação anti-bot
    </p>
    {% if turnstile_site_key %}
    <div data-turnstile-widget data-sitekey="{{ turnstile_site_key }}" data-theme="auto" data-size="{{ turnstile_size|default:'flexible' }}"></div>
    {% else %}
    <p class="text-xs font-ui text-red-500" x-text="t('Verificação anti-bot indisponível.', 'Anti-bot verification unavailable.')">Verificação anti-bot indisponível.</p>
    {% endif %}
    {% if form.non_field_errors %}
    <p class="mt-2 px-3 text-xs text-red-500 font-ui">{{ form.non_field_errors|first }}</p>
    {% endif %}
</div>
