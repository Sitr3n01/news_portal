name: Django CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    # Settings de teste herdam base.py, que lê SECRET_KEY/DB_* do ambiente no
    # import. Compartilhado por todos os steps (collectstatic e pytest).
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: ci-test-secret-key-not-for-production
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: news_portal_test
      DB_USER: news_portal_user
      DB_PASSWORD: news_portal_pass
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: news_portal_test
          POSTGRES_USER: news_portal_user
          POSTGRES_PASSWORD: news_portal_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    
    - name: Set up Python 3.12
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: "3.12"
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/development.txt
        
    - name: Run Linting
      run: |
        ruff check .
        
    # Builds the staticfiles manifest so {% static %} (used by the base
    # templates for the vendored JS) resolves during template rendering in
    # tests — CompressedManifestStaticFilesStorage needs it.
    - name: Collect Static Files
      run: |
        python manage.py collectstatic --noinput

    - name: Run Tests
      run: |
        pytest
