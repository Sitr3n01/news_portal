<nav x-data="{ mobileMenuOpen: false }" class="fixed top-0 z-50 w-full glass-nav shadow-sm shadow-slate-200/40 dark:shadow-black/40">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="flex h-20 items-center justify-between gap-6">
            <a href="{% url 'school:home' %}" class="group flex min-w-0 items-center gap-3 rounded-2xl focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-600 focus-visible:ring-offset-4">
                {% if site_settings and site_settings.logo %}
                <img class="h-11 w-auto max-w-[12rem] object-contain transition-transform duration-200 group-hover:scale-[1.02]"
                    src="{{ site_settings.logo.url }}" alt="{{ current_site.name }}">
                {% else %}
                <span class="min-w-0 truncate font-display text-xl font-bold text-slate-950 dark:text-white sm:text-2xl">
                    {{ current_site.name }}
                </span>
                {% endif %}
            </a>

            <!-- Lado direito: links de navegação + controles (tema, idioma, menu mobile).
                 justify-between empurra o logo para a esquerda e este grupo para a direita. -->
            <div class="flex items-center gap-1.5 sm:gap-2 md:gap-4">
                <!-- Links de navegação (desktop) -->
                <div class="hidden items-center gap-5 lg:flex">
                    <a href="{% url 'school:home' %}"
                        class="rounded-full px-1 text-sm font-semibold text-slate-700 transition-colors hover:text-primary-700 dark:text-slate-200 dark:hover:text-primary-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-600 focus-visible:ring-offset-4"
                        x-text="t('Início', 'Home')">Início</a>
                    <a href="{% url 'school:about' %}"
                        class="rounded-full px-1 text-sm font-semibold text-slate-700 transition-colors hover:text-primary-700 dark:text-slate-200 dark:hover:text-primary-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-600 focus-visible:ring-offset-4"
                        x-text="t('Sobre', 'About')">Sobre</a>
                    <a href="{% url 'school:page_detail' 'cursos' %}"
                        class="rounded-full px-1 text-sm font-semibold text-slate-700 transition-colors hover:text-primary-700 dark:text-slate-200 dark:hover:text-primary-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-600 focus-visible:ring-offset-4"
                        x-text="t('Cursos', 'Courses')">Cursos</a>
                </div>
                <a href="{{ kelly_blog_public_url }}"
                    class="hidden sm:inline-flex items-center justify-center rounded-full px-4 py-2 text-sm font-bold text-slate-700 transition-all hover:text-primary-700 dark:text-slate-200 dark:hover:text-primary-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-600 focus-visible:ring-offset-4 lg:hidden"
                    x-text="t('Notícias', 'News')">Notícias</a>
                <a href="{{ kelly_blog_public_url }}"
                    class="liquid-chip jump-lift hidden lg:inline-flex items-center justify-center rounded-full px-5 py-2.5 text-sm font-bold text-primary-900 transition-all hover:text-primary-700 dark:text-primary-100 dark:hover:text-white focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-600 focus-visible:ring-offset-4"
                    x-text="t('Notícias', 'News')">Notícias</a>
                <a href="{% url 'contact:page' %}"
                    class="jump-lift hidden sm:inline-flex items-center justify-center rounded-full bg-primary-600 px-5 py-2.5 text-sm font-bold text-white shadow-lg shadow-primary-600/20 transition-all hover:bg-primary-700 dark:bg-primary-500 dark:hover:bg-primary-400 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-600 focus-visible:ring-offset-4"
                    x-text="t('Fale com a Komuniki', 'Talk to Komuniki')">
                    Fale com a Komuniki
                </a>

                <!-- Controles sempre visíveis: tema, idioma e menu mobile -->
                <!-- Alternar tema -->
                <button type="button" @click="theme = theme === 'dark' ? 'light' : 'dark'"
                    class="inline-flex h-11 w-11 items-center justify-center rounded-2xl text-slate-700 transition-colors hover:text-primary-700 dark:text-slate-200 dark:hover:text-primary-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-600 focus-visible:ring-offset-4"
                    :aria-label="theme === 'dark' ? t('Modo claro', 'Light mode') : t('Modo escuro', 'Dark mode')">
                    <svg x-show="theme !== 'dark'" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
                    </svg>
                    <svg x-show="theme === 'dark'" x-cloak class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                </button>

                <!-- Alternar idioma -->
                <button type="button" @click="lang = lang === 'pt' ? 'en' : 'pt'"
                    class="inline-flex h-11 min-w-[2.75rem] items-center justify-center rounded-2xl px-3 text-xs font-bold text-slate-700 transition-colors hover:text-primary-700 dark:text-slate-200 dark:hover:text-primary-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-600 focus-visible:ring-offset-4"
                    :aria-label="t('Mudar idioma', 'Change language')">
                    <span x-text="lang === 'pt' ? 'EN' : 'PT'">EN</span>
                </button>

                <button type="button" @click="mobileMenuOpen = !mobileMenuOpen"
                    :aria-expanded="mobileMenuOpen.toString()" aria-controls="school-mobile-menu"
                    :aria-label="t('Abrir menu', 'Open menu')"
                    class="liquid-chip inline-flex h-11 w-11 items-center justify-center rounded-2xl text-slate-700 transition-colors hover:border-primary-200 hover:text-primary-700 dark:text-slate-200 dark:hover:text-primary-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-600 focus-visible:ring-offset-4 md:hidden">
                    <svg class="h-6 w-6" x-show="!mobileMenuOpen" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 7h16M4 12h16M4 17h16" />
                    </svg>
                    <svg class="h-6 w-6" x-cloak x-show="mobileMenuOpen" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div id="school-mobile-menu" x-cloak x-show="mobileMenuOpen" x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 -translate-y-3" x-transition:enter-end="opacity-100 translate-y-0"
        x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 translate-y-0"
        x-transition:leave-end="opacity-0 -translate-y-3"
        class="absolute w-full border-t border-slate-200 bg-white shadow-xl shadow-slate-900/10 dark:border-white/10 dark:bg-[#0a1322] md:hidden">
        <div class="mx-auto flex max-w-7xl flex-col gap-2 px-4 py-5 sm:px-6">
            <a href="{% url 'school:home' %}"
                class="rounded-2xl px-4 py-3 text-base font-semibold text-slate-800 transition-colors hover:bg-white/70 hover:text-primary-700 dark:text-slate-200 dark:hover:bg-white/10 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-600"
                x-text="t('Início', 'Home')">Início</a>
            <a href="{% url 'school:about' %}"
                class="rounded-2xl px-4 py-3 text-base font-semibold text-slate-800 transition-colors hover:bg-white/70 hover:text-primary-700 dark:text-slate-200 dark:hover:bg-white/10 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-600"
                x-text="t('Sobre', 'About')">Sobre</a>
            <a href="{% url 'school:page_detail' 'cursos' %}"
                class="rounded-2xl px-4 py-3 text-base font-semibold text-slate-800 transition-colors hover:bg-white/70 hover:text-primary-700 dark:text-slate-200 dark:hover:bg-white/10 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-600"
                x-text="t('Cursos', 'Courses')">Cursos</a>
            <a href="{{ kelly_blog_public_url }}"
                class="rounded-2xl px-4 py-3 text-base font-semibold text-slate-800 transition-colors hover:bg-slate-100 hover:text-primary-700 dark:text-slate-200 dark:hover:bg-white/10 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-600"
                x-text="t('Notícias', 'News')">Notícias</a>
            <a href="{% url 'contact:page' %}"
                class="jump-lift mt-2 inline-flex min-h-12 items-center justify-center rounded-full bg-primary-600 px-5 py-3 text-base font-bold text-white shadow-lg shadow-primary-600/20 transition-colors hover:bg-primary-700 dark:bg-primary-500 dark:hover:bg-primary-400 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-600 focus-visible:ring-offset-2"
                x-text="t('Fale com a Komuniki', 'Talk to Komuniki')">
                Fale com a Komuniki
            </a>
        </div>
    </div>
