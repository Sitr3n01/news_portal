# Sem esta diretiva o nginx usa só 1 processo; 'auto' acompanha os núcleos da VPS.
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # Restaura o IP real do visitante via header CF-Connecting-IP quando a requisição
    # chega pelo Cloudflare. Sem isto, $remote_addr/$binary_remote_addr seriam IPs do
    # Cloudflare — quebrando rate-limit, django-axes e o remoteip do Turnstile. Inline
    # (não include externo) de propósito: o deploy recarrega via `compose restart nginx`,
    # que aplica o nginx.conf (bind-mount vivo) SEM recriar o container.
    # Regenere as faixas com scripts/deploy/cloudflare-realip-update.sh (cole entre os marcadores).
    # >>> cloudflare-realip >>>
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;
    # <<< cloudflare-realip <<<

    sendfile on;
    keepalive_timeout 65;

    # Compressão de respostas de texto (HTML/CSS/JS/JSON/XML/SVG). Reduz o volume
    # transferido — menos banda e menos tempo de envio. Binários/imagens já
    # comprimidos ficam de fora pela lista gzip_types.
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # Rate limiting zone (10MB shared memory, 10 req/s per IP).
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

    upstream django {
        server web:8000;
        # Mantém um pool de conexões abertas com o gunicorn (exige proxy_http_version
        # 1.1 + Connection "" nos locations) — evita abrir/fechar socket a cada request.
        keepalive 16;
    }

    server {
        listen 80;
        server_name
            komuniki.com.br
            www.komuniki.com.br
            kellyfarias.com.br
            www.kellyfarias.com.br;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name
            komuniki.com.br
            www.komuniki.com.br
            kellyfarias.com.br
            www.kellyfarias.com.br;

        ssl_certificate /etc/letsencrypt/live/komuniki.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/komuniki.com.br/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com https://www.instagram.com https://www.tiktok.com https://challenges.cloudflare.com; connect-src 'self' https://challenges.cloudflare.com; base-uri 'self'; form-action 'self'" always;

        client_max_body_size 10M;

        # Kelly root opens the blog while the same Django app serves both domains.
        location = / {
            if ($host ~* ^(www\.)?kellyfarias\.com\.br$) {
                return 302 /news/;
            }

            limit_req zone=general burst=20 nodelay;

            proxy_pass http://django;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            limit_req zone=general burst=20 nodelay;

            proxy_pass http://django;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Resumes are served only by authenticated views via X-Accel-Redirect.
        location /protected/ {
            internal;
            alias /app/media/;
        }

        location /media/hiring/resumes/ {
            internal;
        }

        location /media/ {
            alias /app/media/;
            expires 7d;
        }
    }
}
