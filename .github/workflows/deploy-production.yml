name: Deploy Production

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  validate-ref:
    name: Validate deploy branch
    runs-on: ubuntu-latest
    steps:
      - name: Allow only master
        run: test "${GITHUB_REF}" = "refs/heads/master"

  test:
    name: Test before deploy
    runs-on: ubuntu-latest
    needs: validate-ref
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: ci-test-secret-key-not-for-production
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: news_portal_test
      DB_USER: news_portal_user
      DB_PASSWORD: news_portal_pass
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: news_portal_test
          POSTGRES_USER: news_portal_user
          POSTGRES_PASSWORD: news_portal_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/development.txt

      - name: Run linting
        run: ruff check .

      - name: Collect static files
        run: python manage.py collectstatic --noinput

      - name: Run tests
        run: pytest

  deploy:
    name: Approve production deploy
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Mark approved production commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f production-approved "${GITHUB_SHA}"
          git push --force origin refs/tags/production-approved
