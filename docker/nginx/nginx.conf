events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Rate limiting zone (10MB shared memory, 10 req/s per IP).
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

    upstream django {
        server web:8000;
    }

    server {
        listen 80;
        server_name
            komuniki.com.br
            www.komuniki.com.br
            kellyfarias.com.br
            www.kellyfarias.com.br;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name
            komuniki.com.br
            www.komuniki.com.br
            kellyfarias.com.br
            www.kellyfarias.com.br;

        ssl_certificate /etc/letsencrypt/live/komuniki.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/komuniki.com.br/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; object-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com https://challenges.cloudflare.com; connect-src 'self' https://challenges.cloudflare.com; base-uri 'self'; form-action 'self'" always;

        client_max_body_size 10M;

        # Kelly root opens the blog while the same Django app serves both domains.
        location = / {
            if ($host ~* ^(www\.)?kellyfarias\.com\.br$) {
                return 302 /news/;
            }

            limit_req zone=general burst=20 nodelay;

            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            limit_req zone=general burst=20 nodelay;

            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Resumes are served only by authenticated views via X-Accel-Redirect.
        location /protected/ {
            internal;
            alias /app/media/;
        }

        location /media/hiring/resumes/ {
            internal;
        }

        location /media/ {
            alias /app/media/;
            expires 7d;
        }
    }
}
