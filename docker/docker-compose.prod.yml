services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    # --max-requests/-jitter: cada worker é reciclado a ~1000±200 requests, devolvendo
    # memória ao SO e impedindo o crescimento monotônico de RSS (causa nº 1 de "memória
    # sempre subindo" em gunicorn). --workers: usar (2×núcleos)+1; em 1 vCPU = 3.
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 2 --max-requests 1000 --max-requests-jitter 200 --access-logfile - --error-logfile -
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8000"
    env_file:
      - ../.env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      db:
        condition: service_healthy
    restart: always
    # Teto de memória = rede de segurança: se algo crescer, o container é morto e
    # reiniciado em vez de derrubar a VPS inteira por OOM. Aplicado ao recriar o web.
    # cpus omitido de propósito: em 1 vCPU um teto rígido de CPU estrangularia o web.
    deploy:
      resources:
        limits:
          memory: 1500M

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - ../.env.prod
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${DB_USER} -d $${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 1024M

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - web
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M

  certbot:
    image: certbot/certbot:latest
    profiles:
      - tools
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot

volumes:
  postgres_data:
  static_volume:
  media_volume:
  certbot_conf:
  certbot_www:
