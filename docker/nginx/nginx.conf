events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Rate limiting zone (10MB shared memory, 10 req/s por IP)
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

    upstream django {
        server web:8000;
    }

    server {
        listen 80;
        server_name _;  # Catch-all (IP fixo). Trocar pelo domínio real quando disponível.

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com; connect-src 'self'; base-uri 'self'; form-action 'self'" always;

        # Limitar tamanho de upload
        client_max_body_size 10M;

        # Configuração para Certbot (SSL)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirecionamento HTTP para HTTPS (descomentar quando SSL estiver ativo)
        # location / {
        #     return 301 https://$host$request_uri;
        # }

        # Kelly root opens the blog while the same Django app serves both domains.
        location = / {
            if ($host ~* ^(www\.)?kellyfarias\.com\.br$) {
                return 302 /news/;
            }

            limit_req zone=general burst=20 nodelay;

            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy reverso do Django
        location / {
            limit_req zone=general burst=20 nodelay;

            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Currículos: servidos apenas via X-Accel-Redirect pela view autenticada.
        location /protected/ {
            internal;
            alias /app/media/;
        }

        # Bloqueia acesso público direto aos currículos (somente via /protected/).
        location /media/hiring/resumes/ {
            internal;
        }

        location /media/ {
            alias /app/media/;
            expires 7d;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # GO-LIVE TLS (HTTPS) — descomente quando houver domínio real + certificado.
    # Passo a passo em docs/development/go-live-checklist.md. Resumo:
    #   1) troque `server_name _` (acima) pelo domínio real;
    #   2) emita o certificado via certbot (volumes certbot_conf/certbot_www já
    #      montados no docker-compose.prod.yml);
    #   3) no server :80, ative o redirect 301 para HTTPS (mantendo o
    #      location /.well-known/acme-challenge/);
    #   4) descomente o server :443 abaixo.
    #
    # server {
    #     listen 443 ssl;
    #     http2 on;
    #     server_name SEU_DOMINIO;
    #
    #     ssl_certificate     /etc/letsencrypt/live/SEU_DOMINIO/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #
    #     # HSTS (2 anos) — só sob HTTPS. O Django também emite via SECURE_HSTS_*.
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    #     # Replique os MESMOS cabeçalhos de segurança + Content-Security-Policy do
    #     # server :80 acima (X-Content-Type-Options, X-Frame-Options, Referrer-Policy,
    #     # Permissions-Policy, Content-Security-Policy).
    #
    #     client_max_body_size 10M;
    #
    #     location / {
    #         limit_req zone=general burst=20 nodelay;
    #         proxy_pass http://django;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    #
    #     location /static/ {
    #         alias /app/staticfiles/;
    #         expires 30d;
    #         add_header Cache-Control "public, immutable";
    #     }
    #
    #     location /protected/            { internal; alias /app/media/; }
    #     location /media/hiring/resumes/ { internal; }
    #     location /media/                { alias /app/media/; expires 7d; }
    # }
}
